name: FORM → Garmin Sync

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Sync FORM export to Garmin Connect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install form_sync dependencies
        run: pip install -e ".[form_sync]"

      - name: Run FORM sync pipeline
        env:
          FFF_GMAIL_ADDRESS:        ${{ secrets.FFF_GMAIL_ADDRESS }}
          FFF_GMAIL_APP_PASSWORD:   ${{ secrets.FFF_GMAIL_APP_PASSWORD }}
          FFF_GARMIN_EMAIL:         ${{ secrets.FFF_GARMIN_EMAIL }}
          FFF_GARMIN_PASSWORD:      ${{ secrets.FFF_GARMIN_PASSWORD }}
          FFF_GARMIN_TOKENS:        ${{ secrets.FFF_GARMIN_TOKENS }}
          FFF_GH_PAT:               ${{ secrets.FFF_GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          FFF_GARMIN_SERIAL_NUMBER: ${{ secrets.FFF_GARMIN_SERIAL_NUMBER }}
          FFF_GARMIN_DEVICE_ID:     ${{ secrets.FFF_GARMIN_DEVICE_ID }}
        run: python -m fit_file_faker.form_sync.pipeline

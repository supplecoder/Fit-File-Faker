name: FORM → Garmin Sync

on:
  # Primary trigger: a Google Apps Script watches Gmail and fires this via the
  # GitHub repository_dispatch API the moment a FORM export email arrives.
  # This is used instead of `schedule` because scheduled (cron) workflows do
  # NOT run on forked repositories — GitHub silently disables them on forks.
  repository_dispatch:
    types: [form-export-ready]

  # Manual trigger from the GitHub Actions UI / API (also works on forks).
  workflow_dispatch:

  # NOTE: a `schedule:` cron trigger was removed. On forks (and low-activity
  # repos) GitHub's scheduler is best-effort and heavily throttles cron — a
  # "*/15" request was actually firing only every 2–4 hours, with intermediate
  # ticks silently dropped. The Apps Script repository_dispatch path above is
  # the reliable trigger. If this repo is ever recreated as a standalone
  # (non-fork) repo, cron is honored normally and a schedule block can return.

jobs:
  sync:
    name: Sync FORM export to Garmin Connect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install form_sync dependencies
        run: pip install -e ".[form_sync]"

      - name: Run FORM sync pipeline
        env:
          FFF_GMAIL_ADDRESS:        ${{ secrets.FFF_GMAIL_ADDRESS }}
          FFF_GMAIL_APP_PASSWORD:   ${{ secrets.FFF_GMAIL_APP_PASSWORD }}
          FFF_GARMIN_EMAIL:         ${{ secrets.FFF_GARMIN_EMAIL }}
          FFF_GARMIN_PASSWORD:      ${{ secrets.FFF_GARMIN_PASSWORD }}
          FFF_GARMIN_TOKENS:        ${{ secrets.FFF_GARMIN_TOKENS }}
          FFF_GH_PAT:               ${{ secrets.FFF_GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          FFF_GARMIN_UNIT_ID:       ${{ secrets.FFF_GARMIN_UNIT_ID }}
          FFF_GARMIN_DEVICE_ID:     ${{ secrets.FFF_GARMIN_DEVICE_ID }}
        run: python -m fit_file_faker.form_sync.pipeline
